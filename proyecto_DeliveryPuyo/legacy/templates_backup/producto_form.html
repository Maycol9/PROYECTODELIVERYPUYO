{% extends 'base.html' %}

{% block title %}Producto | DeliverPuyo{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <div class="form-box">
            <h1>Registrar producto</h1>
            <p class="form-subtitle">
                Completa la información del producto para integrarlo al catálogo del sistema.
            </p>

            <form method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre del producto</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        class="form-control"
                        placeholder="Ejemplo: Hamburguesa clásica"
                        value="{{ producto.nombre if producto else '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <input
                        type="text"
                        id="categoria"
                        name="categoria"
                        class="form-control"
                        placeholder="Ejemplo: Comida rápida"
                        value="{{ producto.categoria if producto else '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="precio">Precio</label>
                    <input
                        type="number"
                        step="0.01"
                        id="precio"
                        name="precio"
                        class="form-control"
                        placeholder="0.00"
                        value="{{ producto.precio if producto else '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input
                        type="number"
                        id="stock"
                        name="stock"
                        class="form-control"
                        placeholder="0"
                        value="{{ producto.stock if producto else '' }}"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-green">Guardar producto</button>
                    <a href="{{ url_for('productos') }}" class="btn btn-light">Volver al catálogo</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
