{% extends "base.html" %}
{% block content %}
    <h1>Gestión de Inventario - Delivery Puyo</h1>
    
    <form action="/añadir" method="POST">
        <input type="text" name="nombre" placeholder="Nombre del plato" required>
        <input type="number" step="0.01" name="precio" placeholder="Precio" required>
        <input type="number" name="stock" placeholder="Cantidad" required>
        <button type="submit">Agregar al Menú</button>
    </form>

    <hr>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
        {% for p in productos %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.nombre }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td><a href="/eliminar/{{ p.id }}">Eliminar</a></td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
