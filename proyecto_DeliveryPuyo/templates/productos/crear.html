{% extends 'base.html' %}

{% block title %}Registrar producto | DeliverPuyo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="mb-4">Registrar producto</h2>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ingrese el nombre del producto" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" name="categoria" class="form-control" placeholder="Ingrese la categoría del producto" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" name="precio" step="0.01" class="form-control" placeholder="Ingrese el precio" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control" placeholder="Ingrese la cantidad disponible" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Guardar</button>
                        <a href="{{ url_for('listar_productos') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
