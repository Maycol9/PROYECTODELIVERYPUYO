{% extends 'base.html' %}

{% block title %}Producto{% endblock %}

{% block content %}
<section class="form-box">
    <h2>{% if producto %}Editar producto{% else %}Nuevo producto{% endif %}</h2>

    <form method="POST">
        <label>Nombre</label>
        <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>

        <label>Categoría</label>
        <input type="text" name="categoria" value="{{ producto.categoria if producto else '' }}" required>

        <label>Precio</label>
        <input type="number" step="0.01" name="precio" value="{{ producto.precio if producto else '' }}" required>

        <label>Stock</label>
        <input type="number" name="stock" value="{{ producto.stock if producto else '' }}" required>

        <button type="submit">Guardar</button>
    </form>
</section>
{% endblock %}
